name: "Dissent Review"
description: "Swarm intelligence code review - diverse AI agents that debate your PRs and post inline comments"
branding:
  icon: "message-circle"
  color: "purple"

inputs:
  api-key:
    description: "OpenAI API key (or any compatible provider key)"
    required: true
  model:
    description: "LLM model to use"
    default: "gpt-4o"
  base-url:
    description: "API base URL for alternative providers (e.g. http://localhost:11434/v1 for Ollama)"
    required: false
  rounds:
    description: "Number of debate rounds between agents"
    default: "2"
  personas:
    description: "Comma-separated list of personas to use (default: all). Options: security,performance,readability,architecture,testing,correctness"
    required: false
  persona-file:
    description: "Path to a custom persona YAML file (.dissent.yaml)"
    required: false
  github-token:
    description: "GitHub token used to post review comments. Defaults to the built-in GITHUB_TOKEN."
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install dissent
      shell: bash
      run: pip install --quiet "dissent==0.1.0"

    - name: Run dissent review
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.api-key }}
        DISSENT_MODEL: ${{ inputs.model }}
        DISSENT_BASE_URL: ${{ inputs.base-url }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        ARGS="--rounds ${{ inputs.rounds }}"

        if [ -n "${{ inputs.personas }}" ]; then
          ARGS="$ARGS --personas ${{ inputs.personas }}"
        fi

        if [ -n "${{ inputs.persona-file }}" ]; then
          ARGS="$ARGS --persona-file ${{ inputs.persona-file }}"
        fi

        dissent-pr "${{ github.event.pull_request.html_url }}" $ARGS
